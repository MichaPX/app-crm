<style>


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--bg2:#ffffff;--bg3:#eeeeeb;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1a1a1a;--text2:#666660;--text3:#999990;
  --accent:#534AB7;--accent2:#6b62d4;
  --green:#0F6E56;--green-bg:#E1F5EE;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --orange:#854F0B;--orange-bg:#FAEEDA;
  --blue:#0C447C;--blue-bg:#E6F1FB;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --teal:#085041;--teal-bg:#E1F5EE;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
.layout{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.logo-icon{width:28px;height:28px;border-radius:8px;background:#534AB7;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.logo-text{font-size:14px;font-weight:600;letter-spacing:-.2px}
.logo-sub{font-size:11px;color:var(--text2);margin-left:3px}
.hsep{width:1px;height:18px;background:var(--border);margin:0 4px}
.hdate{font-size:11px;color:var(--text3)}
.h-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.statsbar{display:flex;gap:8px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.stat-pill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:100px;border:1px solid #d5d5d0;font-size:11px;color:#555550;background:#f5f5f3;cursor:pointer;transition:border-color .12s,box-shadow .12s;user-select:none}.stat-pill:hover{border-color:#b5b5b0}.stat-pill.active{box-shadow:0 0 0 2px #534AB7;border-color:#534AB7}
.stat-pill b{color:var(--text);font-weight:600}
.sp-green{border-color:#9FE1CB;color:#085041;background:#E1F5EE}
.sp-red{border-color:#F7C1C1;color:#791F1F;background:#FCEBEB}
.sp-orange{border-color:#FAC775;color:#633806;background:#FAEEDA}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:#fff}
.search-wrap{position:relative}
.search-wrap .ti{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
input[type=search]{padding:6px 10px 6px 30px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);width:200px;outline:none;transition:border-color .15s}
input[type=search]:focus{border-color:var(--accent)}
select{padding:6px 10px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.btn{padding:6px 12px;font-size:12px;font-family:inherit;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border)}
.content{flex:1;overflow:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.section-sep{grid-column:1/-1;font-size:11px;font-weight:600;color:#999990;text-transform:uppercase;letter-spacing:.8px;padding:6px 0 4px;margin-top:12px;border-top:1px solid #e0e0dc;display:flex;align-items:center;gap:10px}.section-sep:first-child{margin-top:0;border-top:none}
.section-sep:first-child{margin-top:0;border-top:none}
.app-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .12s,background .12s;display:flex;flex-direction:column;height:185px;overflow:hidden;padding:0}
.ac-statusbar{height:5px;width:100%;flex-shrink:0}.ac-inner{padding:10px 12px;display:flex;flex-direction:column;flex:1}.ac-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}.ac-divider{height:0.5px;background:var(--border);margin-bottom:8px}.app-card:hover{border-color:var(--border2);background:var(--bg3)}
.app-card.blocked{border-left:2px solid #A32D2D;border-radius:0 12px 12px 0}
.ac-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ac-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ac-meta{font-size:11px;color:var(--text2);margin-bottom:8px;font-family:'DM Mono',monospace;line-height:1.5}
.ac-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;min-height:20px}
.ac-footer{margin-top:auto;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ac-year{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.ac-access{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;text-align:right}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500;white-space:nowrap}
.b-teal{background:#E1F5EE;color:#085041}
.b-blue{background:#E6F1FB;color:#0C447C}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-orange{background:#FAEEDA;color:#633806}
.b-red{background:#FCEBEB;color:#791F1F}
.b-green{background:#EAF3DE;color:#27500A}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.empty{text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1}
.empty .ti{font-size:36px;display:block;margin:0 auto 10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border-radius:12px;padding:24px;width:580px;max-height:90vh;overflow-y:auto;border:1px solid var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:mIn .15s ease}
@keyframes mIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal h3{font-size:15px;font-weight:600;margin-bottom:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;color:var(--text2);font-weight:500}
.field input,.field select{padding:7px 10px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.check-field{display:flex;align-items:center;gap:8px;padding-top:18px}
.check-field input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.check-field label{font-size:12px;color:var(--text);cursor:pointer}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.fdiv{grid-column:1/-1;height:1px;background:var(--border);margin:4px 0}
.fsec{grid-column:1/-1;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.info-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.info-label{min-width:130px;font-size:11px;color:var(--text3);flex-shrink:0;padding-top:1px}
.info-val{font-size:12px;color:var(--text)}
.info-link{color:var(--blue);word-break:break-all;font-size:11px}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:12px;font-family:inherit;font-weight:500;text-decoration:none;transition:opacity .12s;cursor:pointer}
.link-btn:hover{opacity:.85}
.link-btn-apple{background:#000;color:#fff}
.link-btn-google{background:#34A853;color:#fff}
.link-btn-appmanager{background:#EEEDFE;color:#3C3489;border:0.5px solid #C5C2F7}
.link-btn-pegasus{background:#F5C842;color:#333;border:0.5px solid #E0B800}

/* Toggle Switch */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #f0f0ec}
.toggle-label{font-size:12px;color:#666;min-width:130px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#d5d5d0;border-radius:24px;transition:.2s}
.toggle-slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked + .toggle-slider{background:#534AB7}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
.toggle-value{font-size:12px;font-weight:500;color:#534AB7;min-width:60px}

/* Status badges */
.b-update-needed{background:#FFF3E0;color:#E65100}
.b-in-update{background:#EDE7F6;color:#4527A0}
.card-im-update{position:absolute;top:10px;right:10px;font-size:10px;font-weight:600;color:#4527A0;background:#EDE7F6;padding:3px 8px;border-radius:100px;border:1px solid #C5B8F0}
.card-benoetigt{font-size:10px;font-weight:600;color:#E65100;background:#FFF3E0;padding:3px 8px;border-radius:100px;border:1px solid #FFB74D;white-space:nowrap}
.app-card{position:relative}
.sec-head{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 4px}
.toast{position:fixed;bottom:20px;right:20px;z-index:300;background:#fff;border:1px solid #d5d5d0;border-radius:8px;padding:10px 16px;font-size:12px;color:#1a1a1a;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);animation:tIn .2s ease;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccccC8;border-radius:10px}
.login-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border:0.5px solid #e0e0dc;border-radius:16px;padding:40px 36px;width:360px;text-align:center}
.login-logo{width:48px;height:48px;border-radius:14px;background:#534AB7;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin:0 auto 16px}
.login-title{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.login-sub{font-size:13px;color:#999;margin-bottom:28px}
.login-field{width:100%;padding:10px 14px;font-size:13px;font-family:inherit;border:0.5px solid #d5d5d0;border-radius:8px;background:#f5f5f3;color:#1a1a1a;outline:none;transition:border-color .15s;margin-bottom:12px;text-align:left}
.login-field:focus{border-color:#534AB7;background:#fff}
.login-btn{width:100%;padding:11px;font-size:13px;font-family:inherit;background:#534AB7;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:500;transition:background .15s;margin-top:4px}
.login-btn:hover{background:#6b62d4}
.login-error{font-size:12px;color:#A32D2D;background:#FCEBEB;border-radius:6px;padding:8px 12px;margin-bottom:12px;display:none;text-align:left}
.login-hint{font-size:11px;color:#bbb;margin-top:16px}
.changelog-modal{background:#fff;border-radius:12px;padding:24px;width:640px;max-height:85vh;overflow-y:auto;border:0.5px solid #d5d5d0;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:mIn .15s ease}
.cl-entry{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid #f0f0ec}
.cl-entry:last-child{border-bottom:none}
.cl-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.cl-time{font-size:11px;color:#999;min-width:110px;flex-shrink:0;padding-top:1px}
.cl-app{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.cl-changes{font-size:11px;color:#666;line-height:1.6}
.cl-field{display:inline-block;background:#f0f0ec;border-radius:4px;padding:1px 5px;font-size:10px;color:#444;margin-right:3px;margin-bottom:2px}
.cl-arrow{color:#aaa;margin:0 3px;font-size:10px}
.cl-val-old{color:#A32D2D;text-decoration:line-through;font-size:10px}
.cl-val-new{color:#085041;font-size:10px;font-weight:500}
.dashboard{display:flex;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;flex-wrap:wrap;align-items:flex-start}
.dash-grid{display:flex;gap:8px;flex-wrap:wrap}
.dash-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:120px;cursor:pointer;transition:border-color .12s}
.dash-card:hover{border-color:var(--border2)}
.dash-card.active{border-color:var(--accent)}
.dc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dc-val{font-size:20px;font-weight:600;line-height:1;color:var(--text)}
.dc-label{font-size:10px;color:var(--text3);margin-top:2px}
.dash-bars{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:180px;flex:1}
.db-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.db-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;cursor:pointer}
.db-row:last-child{margin-bottom:0}
.db-row:hover .db-label{color:var(--text)}
.db-label{color:var(--text2);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.db-bar-wrap{flex:1;height:4px;background:#ddddd8;border-radius:2px;overflow:hidden}
.db-bar{height:4px;border-radius:2px;transition:width .3s}
.db-count{color:var(--text3);min-width:28px;text-align:right}



.login-btn:hover{background:#6b62d4}
.login-err{font-size:12px;color:#A32D2D;background:#FCEBEB;border-radius:6px;padding:8px 12px;margin-bottom:12px;display:none;text-align:left}

/* Loading */
.sb-loader{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px}
.sb-spinner{width:36px;height:36px;border:3px solid #EEEDFE;border-top-color:#534AB7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-loader-msg{font-size:13px;color:#534AB7;font-weight:500}
</style>
</head>
<body>

<!-- Main App -->
<!-- Login Screen -->
<div id="login-screen" style="position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:999">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-device-mobile"></i></div>
    <div class="login-title">App CRM</div>
    <div class="login-sub">Produktion — Bitte einloggen</div>
    <div id="login-error" class="login-error"></div>
    <input class="login-field" type="email" id="login-email" placeholder="E-Mail" autocomplete="email">
    <input class="login-field" type="password" id="login-password" placeholder="Passwort" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Einloggen</button>
    <div class="login-hint">Kein Zugang? Wende dich an den Administrator.</div>
  </div>
</div>

<div class="layout" id="app-layout" style="display:none">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-icon"><i class="ti ti-device-mobile"></i></div>
      <div><span class="logo-text">App CRM</span><span class="logo-sub">Produktion</span></div>
    </div>
    <div class="hsep"></div>
    <div id="hdate" class="hdate"></div>
    <div class="h-right">
      <button class="btn" onclick="openChangelog()"><i class="ti ti-history"></i> Changelog</button>
      <button class="btn" onclick="backupData()" title="Alle Daten als JSON speichern"><i class="ti ti-database-export"></i> Backup</button>
      <button class="btn" onclick="document.getElementById('backup-file').click()" style="color:#085041;background:#E1F5EE;border-color:#9FE1CB" title="Backup einspielen"><i class="ti ti-database-import"></i> Backup einspielen</button>
      <input type="file" id="backup-file" accept=".json" style="display:none" onchange="restoreFromBackup(this)">
      <button class="btn" onclick="document.getElementById('csv-file').click()"><i class="ti ti-upload"></i> Import CSV</button>
      <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(this)">
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn btn-primary" onclick="openAdd()"><i class="ti ti-plus"></i> App hinzufügen</button>
      <div class="hsep"></div>
      <span id="header-user" style="font-size:11px;color:var(--text3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button class="btn" onclick="doLogout()" title="Ausloggen" style="color:#A32D2D;border-color:#F7C1C1"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  
  <div class="dashboard" id="dashboard">
    <div class="dash-grid">
      <div class="dash-card" id="dc-total" style="cursor:pointer" onclick="clearF()"><div class="dc-icon" style="background:rgba(83,74,183,0.12);color:#534AB7"><i class="ti ti-device-mobile"></i></div><div><div class="dc-val" id="dv-total">—</div><div class="dc-label">Apps gesamt</div></div></div>
      <div class="dash-card" style="cursor:pointer" onclick="setStatusFilter('Fertig')"><div class="dc-icon" style="background:#E1F5EE;color:#085041"><i class="ti ti-check"></i></div><div><div class="dc-val" style="color:#085041" id="dv-fertig">—</div><div class="dc-label">Fertig</div></div></div>
      <div class="dash-card" style="cursor:pointer" onclick="setStatusFilter('In Arbeit')"><div class="dc-icon" style="background:#FAEEDA;color:#854F0B"><i class="ti ti-loader"></i></div><div><div class="dc-val" style="color:#854F0B" id="dv-arbeit">—</div><div class="dc-label">In Arbeit</div></div></div>
      <div class="dash-card" style="cursor:pointer" onclick="setStatusFilter('Blockiert')"><div class="dc-icon" style="background:#FCEBEB;color:#A32D2D"><i class="ti ti-lock"></i></div><div><div class="dc-val" style="color:#A32D2D" id="dv-block">—</div><div class="dc-label">Blockiert</div></div></div>
      <div class="dash-card" style="cursor:pointer" onclick="setStatusFilter('Offen')"><div class="dc-icon" style="background:#F1EFE8;color:#5F5E5A"><i class="ti ti-clock"></i></div><div><div class="dc-val" id="dv-offen">—</div><div class="dc-label">Offen</div></div></div>
      <div class="dash-card" id="dc-imupdate" style="cursor:pointer;display:none" onclick="setStatusFilter('imUpdate')"><div class="dc-icon" style="background:#EDE7F6;color:#4527A0"><i class="ti ti-refresh"></i></div><div><div class="dc-val" style="color:#4527A0" id="dv-imupdate">—</div><div class="dc-label">Update läuft</div></div></div>
      <div class="dash-card" id="dc-benoetigt" style="cursor:pointer;display:none" onclick="setStatusFilter('benoetigtUpdate')"><div class="dc-icon" style="background:#FFF3E0;color:#E65100"><i class="ti ti-refresh-alert"></i></div><div><div class="dc-val" style="color:#E65100" id="dv-benoetigt">—</div><div class="dc-label">Benötigt Update</div></div></div>
    </div>
    <div class="dash-bars"><div class="db-title">Store-Verteilung</div><div id="store-bars"></div></div>
    <div class="dash-bars"><div class="db-title">Nach Jahr</div><div id="year-bars"></div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="search" id="search" placeholder="App suchen… (⌘K)" oninput="render()">
    </div>
    <select id="f-store" onchange="render()">
      <option value="">Alle Stores</option>
      <option>verfügbar</option><option>nur Apple</option><option>nur Google</option>
      <option value='aus dem Store'>Aus dem Store</option>

async function sbFetch(path, opts) {
  opts = opts || {};
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    method: opts.method || 'GET',
    body: opts.body || undefined,
    headers: {
      'apikey': SB_KEY,

      'Content-Type': 'application/json',

  });
  if (!res.ok) throw new Error(await res.text());

}

// ── Loading spinner ──
function showLoader(msg) {
  let el = document.getElementById('sb-loader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sb-loader';
    el.className = 'sb-loader';
    document.body.appendChild(el);
  }
  el.innerHTML = '<div class="sb-spinner"></div><div class="sb-loader-msg">' + (msg||'Laden…') + '</div>';
  el.style.display = 'flex';
}
function hideLoader() {
  const el = document.getElementById('sb-loader');
  if (el) el.style.display = 'none';
}

// ── Load apps ──
let apps = [];
let sortCol = 'name', sortDir = 1;

const SESSION_APPS_KEY = 'crm_apps_cache';
const SESSION_APPS_TS = 'crm_apps_ts';
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes

async function loadApps() {
  // Check sessionStorage cache
  const cached = sessionStorage.getItem(SESSION_APPS_KEY);
  const ts = parseInt(sessionStorage.getItem(SESSION_APPS_TS) || '0');
  const age = Date.now() - ts;

  if (cached && age < CACHE_TTL) {
    try {
      apps = JSON.parse(cached);
      render();
      // Silently refresh in background
      refreshFromSupabase(false);
      return;
    } catch(e) {}
  }

  // No valid cache: show spinner and load
  showLoader('Apps werden geladen…');
  await refreshFromSupabase(true);
}

async function refreshFromSupabase(showSpinner) {
  try {
    let all = [], from = 0;
    while (true) {
      const batch = await sbFetch('apps?select=*&order=name.asc', {
        prefer: '', headers: { Range: from + '-' + (from+499) }
      });
      if (!batch || !batch.length) break;
      all = all.concat(batch);
      if (batch.length < 500) break;
      from += 500;
    }
    if (showSpinner) hideLoader();
    if (all.length === 0) {
      showImportScreen();
    } else {
      apps = all.map(rowToApp);
      sessionStorage.setItem(SESSION_APPS_KEY, JSON.stringify(apps)); sessionStorage.setItem(SESSION_APPS_TS, Date.now().toString());
      render();
    }
  } catch(e) {
    if (showSpinner) hideLoader();
    console.error(e);
    if (!apps.length) {
      document.getElementById('grid').innerHTML =
        '<div class="empty" style="grid-column:1/-1"><i class="ti ti-wifi-off" style="font-size:32px;display:block;margin:0 auto 8px;opacity:.3"></i><p>Supabase Fehler: ' + e.message + '</p></div>';
    }
  }
}

// ── Backup & Restore ──
function backupData() {
  const data = JSON.stringify({ version:2, exportedAt: new Date().toISOString(), appCount: apps.length, apps }, null, 2);
  const url = URL.createObjectURL(new Blob([data], {type:'application/json'}));
  const a = document.createElement('a');
  a.href = url; a.download = 'app-crm-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  toast('Backup gespeichert (' + apps.length + ' Apps)');
}

function restoreFromBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.apps || !Array.isArray(backup.apps)) { alert('Ungültige Backup-Datei.'); return; }
      const dt = backup.exportedAt ? new Date(backup.exportedAt).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'}) : '–';
      window._pendingBackup = backup;
      document.getElementById('mc').innerHTML = `<div class="modal-bg">
        <div class="modal" style="width:420px">
          <h3 style="margin-bottom:12px"><i class="ti ti-database-import" style="color:#0C447C;margin-right:6px"></i>Backup wiederherstellen</h3>
          <div style="background:#f5f5f3;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;margin-bottom:12px">
            <b>Datum:</b> ${dt}<br><b>Apps:</b> ${backup.apps.length}
          </div>
          <div style="background:#FCEBEB;border-radius:8px;padding:10px;font-size:12px;color:#791F1F;margin-bottom:16px">
            <i class="ti ti-alert-triangle"></i> Alle bestehenden Supabase-Daten werden ersetzt.
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" onclick="closeMod()">Abbrechen</button>
            <button class="btn btn-primary" id="do-restore-btn"><i class="ti ti-check"></i> Jetzt importieren</button>
          </div>
        </div>
      </div>`;
      document.getElementById('do-restore-btn').onclick = function() { doRestore(window._pendingBackup); };
    } catch(err) { alert('Fehler: ' + err.message); }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

async function doRestore(backup) {
  closeMod();
  showLoader('Alte Daten löschen…');
  try {
    await sbFetch('apps?id=gt.0', { method:'DELETE', prefer:'' });
    const rows = backup.apps.map(a => appToRow(backupToApp(a)));
    for (let i = 0; i < rows.length; i += 50) {
      await sbFetch('apps', { method:'POST', body: JSON.stringify(rows.slice(i,i+50)), prefer:'' });
      showLoader('Importiere… ' + Math.min(Math.round((i+50)/rows.length*100),100) + '%');
    }
    await loadApps();
    toast(backup.apps.length + ' Apps wiederhergestellt ✓');
  } catch(e) { hideLoader(); toast('Fehler: ' + e.message); console.error(e); }
}

// ── Save / Delete ──
async function saveAppSb(a) {
  const row = appToRow(a);
  if (a._dbId) {
    await sbFetch('apps?id=eq.' + a._dbId, { method:'PATCH', body: JSON.stringify(row), prefer:'' });
  } else {
    const res = await sbFetch('apps', { method:'POST', body: JSON.stringify(row) });
    if (res && res[0]) a._dbId = res[0].id;
  }
  return a;
}

async function deleteAppSb(dbId) {
  await sbFetch('apps?id=eq.' + dbId, { method:'DELETE', prefer:'' });
}

async function logChange(appId, appName, changes) {
  try {
    await sbFetch('changelog', { method:'POST', body: JSON.stringify({app_id: String(appId), app_name: appName, changes}), prefer:'' });
  } catch(e) { console.warn('Changelog:', e); }
}

// ── Changelog ──
async function openChangelog() {
  showLoader('Changelog laden…');
  try {
    const rows = await sbFetch('changelog?select=*&order=created_at.desc&limit=200', {prefer:''}) || [];
    hideLoader();
    const entries = rows.length ? rows.map(r => {
      const ch = Array.isArray(r.changes) ? r.changes : [];
      const isNew = ch[0] && ch[0].field === '_new';
      const isDel = ch[0] && ch[0].field === '_deleted';
      const dt = new Date(r.created_at).toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const col = isNew ? '#085041' : isDel ? '#A32D2D' : '#534AB7';
      const chHtml = isNew ? '<span style="color:#085041;font-size:11px"><i class="ti ti-plus"></i> Neu angelegt</span>'
        : isDel ? '<span style="color:#A32D2D;font-size:11px"><i class="ti ti-trash"></i> Gelöscht</span>'
        : ch.map(c => '<div style="font-size:11px"><span style="background:#f0f0ec;border-radius:3px;padding:1px 4px;font-size:10px">' + c.field + '</span> <span style="color:#A32D2D;text-decoration:line-through;font-size:10px">' + (c.from||'').slice(0,20) + '</span> → <span style="color:#085041;font-size:10px;font-weight:500">' + (c.to||'').slice(0,20) + '</span></div>').join('');
      return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid #f0f0ec;align-items:flex-start"><div style="width:8px;height:8px;border-radius:50%;background:' + col + ';margin-top:4px;flex-shrink:0"></div><div style="font-size:11px;color:#999;min-width:110px;flex-shrink:0">' + dt + '</div><div style="flex:1"><div style="font-size:12px;font-weight:500;margin-bottom:3px">' + r.app_name + '</div>' + chHtml + '</div></div>';
    }).join('') : '<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">Noch keine Einträge</div>';
    document.getElementById('mc').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeMod()"><div class="modal" style="width:600px;max-height:85vh"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><h3 style="font-size:15px;font-weight:600">Changelog</h3><div style="font-size:11px;color:#999">' + rows.length + ' Einträge</div></div><button class="btn btn-ghost" onclick="closeMod()" style="padding:4px 8px"><i class="ti ti-x"></i></button></div>' + entries + '</div></div>';
  } catch(e) { hideLoader(); toast('Fehler: ' + e.message); }
}

// ── CRUD ──
async function saveEdit(id) {
  const idx = apps.findIndex(x => String(x.id)===String(id)||String(x._dbId)===String(id));
  if(idx<0){toast('App nicht gefunden');return;}
  const base = apps[idx];
  const old = {...base};
  const a = readForm({...base});
  // Preserve database identity so we PATCH not POST
  a._dbId = base._dbId;
  a.id = base.id;
  if (!a.name) { document.getElementById('f-name').focus(); return; }
  const LABELS = {name:'Name',vApple:'iOS',vGoogle:'Android',store:'Store',year:'Jahr',updateStatus:'Status',fcs:'FCS',blockiert:'Blockiert',storeZugang:'Store Zugang',deeplinks:'Deeplinks',push:'Push',datum:'Datum'};
  const changes = Object.keys(LABELS).filter(k => String(old[k]||'') !== String(a[k]||'')).map(k => ({field:LABELS[k],from:String(old[k]||''),to:String(a[k]||'')}));
  try {
    await saveAppSb(a);
    if (changes.length) await logChange(a.id, a.name, changes);
    apps[idx] = a; sessionStorage.setItem(SESSION_APPS_KEY, JSON.stringify(apps)); sessionStorage.setItem(SESSION_APPS_TS, Date.now().toString()); closeMod(); render(); toast('Gespeichert ✓');
  } catch(e) { hideLoader(); toast('Fehler: ' + e.message); }
}

async function saveAdd() {
  const a = readForm({id:Date.now(),name:'',pegasus:'',vApple:'',vGoogle:'',appleStore:'',googleStore:'',store:'',year:new Date().getFullYear().toString(),storeZugang:'',deeplinks:'',push:'',produktIDs:'',updateStatus:'Offen',fcs:'',datum:'',loginApple:'',loginGoogle:'',appManager:'',update:'',blockiert:false,statistik:'',updateAppManager:'',features:{}});
  if (!a.name) { document.getElementById('f-name').focus(); return; }
  try {
    await saveAppSb(a);
    await logChange(a.id, a.name, [{field:'_new',from:'',to:''}]);
    apps.push(a); sessionStorage.setItem(SESSION_APPS_KEY, JSON.stringify(apps)); sessionStorage.setItem(SESSION_APPS_TS, Date.now().toString()); hideLoader(); closeMod(); render(); toast('App gespeichert ✓');
  } catch(e) { hideLoader(); toast('Fehler: ' + e.message); }
}

async function confirmDelete(id) {
  const a = apps.find(x => String(x.id)===String(id)||String(x._dbId)===String(id));
  if (!confirm('"' + a.name + '" wirklich löschen?')) return;
  try {
    if (a._dbId) await deleteAppSb(a._dbId);
    await logChange(a.id, a.name, [{field:'_deleted',from:'',to:''}]);
    apps = apps.filter(x => x.id !== id); sessionStorage.setItem(SESSION_APPS_KEY, JSON.stringify(apps)); sessionStorage.setItem(SESSION_APPS_TS, Date.now().toString()); render(); toast('App gelöscht');
  } catch(e) { hideLoader(); toast('Fehler: ' + e.message); }
}

function resetToOriginal() {
  if (confirm('Alle Daten durch Monday-Daten ersetzen?')) importMondayData();
}

// ── Supabase Auth ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!email || !password) { showLoginError('Bitte E-Mail und Passwort eingeben.'); return; }
  btn.textContent = 'Einloggen…'; btn.disabled = true;
  errEl.style.display = 'none';
  try {
    const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Login fehlgeschlagen');
    localStorage.setItem('crm_access_token', data.access_token);
    localStorage.setItem('crm_refresh_token', data.refresh_token);
    localStorage.setItem('crm_user_email', data.user?.email || email);
    showApp(data.user?.email || email);
  } catch(e) {
    showLoginError(e.message);
  } finally {
    btn.textContent = 'Einloggen'; btn.disabled = false;
  }
}

async function doLogout() {
  try {
    const token = localStorage.getItem('crm_access_token');
    if (token) {
      await fetch(SB_URL + '/auth/v1/logout', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      });
    }
  } catch(e) {}
  localStorage.removeItem('crm_access_token');
  localStorage.removeItem('crm_refresh_token');
  localStorage.removeItem('crm_user_email');
  sessionStorage.removeItem(SESSION_APPS_KEY);
  sessionStorage.removeItem(SESSION_APPS_TS);
  document.getElementById('app-layout').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function showApp(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-layout').style.display = 'flex';
  if (email) document.getElementById('header-user').textContent = email;
  initApp();
}

// ── Init ──
function initApp() {
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMod();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  });
  loadApps();
}

document.addEventListener('DOMContentLoaded', function() {
  ['login-email','login-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  });
  const token = localStorage.getItem('crm_access_token');
  const email = localStorage.getItem('crm_user_email');
  if (token) {
    showApp(email);
  }
});
